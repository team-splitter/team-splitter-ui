name: Amplify Publish Prd

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      CI: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Amplify CLI
        run: npm install -g @aws-amplify/cli

      - name: Configure Amplify for CI
        run: |
          echo '{"projectPath":"'"$GITHUB_WORKSPACE"'","envName":"prd","defaultEditor":"vscode"}' > amplify/.config/local-env-info.json
          echo '{"dev":{"configLevel":"project","useProfile":false},"prd":{"configLevel":"project","useProfile":false}}' > amplify/.config/local-aws-info.json

      - name: Publish to prd
        run: amplify publish --environment prd --yes
